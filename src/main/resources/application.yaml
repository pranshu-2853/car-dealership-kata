spring:
  application:
    name: car-dealership
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cardealership}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

app:
  seed-admin:
    enabled: true
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:admin123}
  cors:
    allowed-origins: http://localhost:5173
  jwt:
    secret: ${JWT_SECRET:local-development-secret-key-change-me-in-production-please}
    expiration-ms: 3600000
